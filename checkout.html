    .checkout-page { padding-top: 120px; min-height: 100vh; padding-bottom: 80px; }
    .checkout-header { max-width: var(--container); margin: 0 auto; padding: 0 40px 40px; text-align: center; }

    .checkout-steps { display: flex; justify-content: center; gap: 40px; margin-top: 24px; flex-wrap: wrap; }

    .step.active { color: var(--color-accent); }
    .step.done { color: var(--color-success); }
    .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; background: rgba(255,255,255,0.05); border: 1px solid var(--color-line); }

    .step.done .step-num { background: var(--color-success); color: black; border-color: var(--color-success); }
    .checkout-layout { max-width: var(--container); margin: 0 auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 380px; gap: 40px; }
    .checkout-form { background: rgba(255,255,255,0.03); border: 1px solid var(--color-line); border-radius: 8px; padding: 40px; }

    .form-grid--3 { grid-template-columns: 2fr 1fr 1fr; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 6px; }
    .form-group label.required::after { content: ' *'; color: var(--color-danger); }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--color-line); border-radius: 4px; color: white; font-family: inherit; font-size: 14px; outline: none; transition: var(--transition); }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--color-accent); background: rgba(255,255,255,0.08); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group small { display: block; font-size: 12px; color: var(--color-text-muted); margin-top: 4px; }
    .delivery-option { display: flex; align-items: center; gap: 16px; padding: 20px; background: rgba(255,255,255,0.03); border: 2px solid var(--color-line); border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: var(--transition); }
    .delivery-option:hover { border-color: var(--color-accent); background: rgba(200,160,50,0.05); }
    .delivery-option.selected { border-color: var(--color-accent); background: rgba(200,160,50,0.1); }
    .delivery-option input[type="radio"] { width: 24px; height: 24px; accent-color: var(--color-accent); cursor: pointer; }
    .delivery-icon { font-size: 36px; }
    .delivery-info { flex: 1; }
    .delivery-info h4 { font-size: 16px; font-weight: 600; color: white; margin-bottom: 4px; }
    .delivery-info p { font-size: 13px; color: var(--color-text-muted); }
    .delivery-price { font-family: var(--font-display); font-size: 24px; color: var(--color-accent); font-weight: 700; }
    .delivery-price small { font-size: 12px; color: var(--color-text-muted); display: block; text-transform: uppercase; letter-spacing: 0.1em; }
    .payment-option { display: flex; align-items: center; gap: 16px; padding: 16px; background: rgba(255,255,255,0.03); border: 2px solid var(--color-line); border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: var(--transition); }
    .payment-option:hover { border-color: var(--color-accent); }
    .payment-option.selected { border-color: var(--color-accent); background: rgba(200,160,50,0.1); }
    .payment-option input[type="radio"] { width: 22px; height: 22px; accent-color: var(--color-accent); }
    .checkbox-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--color-line); border-radius: 6px; margin-bottom: 10px; cursor: pointer; transition: var(--transition); }

    .order-summary { position: sticky; top: 100px; align-self: start; background: rgba(255,255,255,0.05); border: 1px solid var(--color-accent); border-radius: 8px; padding: 32px; }
    .order-summary h3 { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.05em; color: var(--color-accent); margin-bottom: 20px; }
    .summary-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--color-line); align-items: center; }
    .summary-item-img { width: 50px; height: 50px; background: white; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }

    .submit-order:hover { background: var(--color-accent-bright); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(200,160,50,0.3); }

      .form-grid, .form-grid--3 { grid-template-columns: 1fr; }
    }

<script>
function renderCheckout() {
  if (STATE.cart.length === 0) {
    document.getElementById('checkoutContent').innerHTML = `
      <div class="empty-cart">
        <div class="empty-cart__icon">🛒</div>
        <h2>Koszyk jest pusty</h2>
        <p style="color:var(--color-text-muted);margin-bottom:24px;">Dodaj części z katalogu aby kontynuować</p>
        <a href="catalog.html" class="btn btn--primary">📦 Przeglądaj katalog</a>
      </div>`;
    return;
  }

  document.getElementById('checkoutContent').innerHTML = `
    <div class="checkout-layout">
      <form class="checkout-form" id="orderForm" onsubmit="event.preventDefault();submitFullOrder(this);">
        
        <!-- Dane kontaktowe -->
        <div class="form-section">
          <h2>👤 Dane kontaktowe</h2>
          <div class="form-grid">
            <div class="form-group">
              <label class="required">Imię i nazwisko</label>
              <input type="text" name="name" required placeholder="Jan Kowalski">
            </div>
            <div class="form-group">
              <label class="required">Telefon</label>
              <input type="tel" name="phone" required placeholder="+48 600 000 000">
              <small>Potrzebny dla kuriera</small>
            </div>
          </div>
          <div class="form-group">
            <label class="required">Email</label>
            <input type="email" name="email" required placeholder="jan@example.com">
            <small>Wyślemy na niego potwierdzenie zamówienia</small>
          </div>
        </div>

        <!-- Faktura VAT -->
        <div class="form-section">
          <h2>🧾 Faktura VAT (opcjonalnie)</h2>
          <div class="checkbox-row" onclick="toggleInvoice()">
            <input type="checkbox" id="wantInvoice" onchange="toggleInvoice()">
            <label>Chcę otrzymać fakturę VAT (dla firm)</label>
          </div>
          <div id="invoiceFields" style="display:none;margin-top:16px;">
            <div class="form-grid">
              <div class="form-group">
                <label>Nazwa firmy</label>
                <input type="text" name="company">
              </div>
              <div class="form-group">
                <label>NIP</label>
                <input type="text" name="nip" placeholder="0000000000">
              </div>
            </div>
          </div>
        </div>

        <!-- Adres dostawy -->
        <div class="form-section">
          <h2>📍 Adres dostawy</h2>
          <div class="form-group">
            <label class="required">Ulica i numer</label>
            <input type="text" name="street" required placeholder="ul. Lotnicza 1/15">
          </div>
          <div class="form-grid--3">
            <div class="form-group">
              <label class="required">Miasto</label>
              <input type="text" name="city" required placeholder="Warszawa">
            </div>
            <div class="form-group">
              <label class="required">Kod pocztowy</label>
              <input type="text" name="zip" required placeholder="00-000">
            </div>
            <div class="form-group">
              <label class="required">Kraj</label>
              <select name="country" required onchange="updateShippingPrices()">
                <option value="PL">🇵🇱 Polska</option>
                <option value="DE">🇩🇪 Niemcy</option>
                <option value="CZ">🇨🇿 Czechy</option>
                <option value="SK">🇸🇰 Słowacja</option>
                <option value="AT">🇦🇹 Austria</option>
                <option value="HU">🇭🇺 Węgry</option>
                <option value="IT">🇮🇹 Włochy</option>
                <option value="FR">🇫🇷 Francja</option>
                <option value="ES">🇪🇸 Hiszpania</option>
                <option value="NL">🇳🇱 Holandia</option>
                <option value="BE">🇧🇪 Belgia</option>
                <option value="UA">🇺🇦 Ukraina</option>
                <option value="other">🌍 Inny kraj UE</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Sposób dostawy -->
        <div class="form-section">
          <h2>📦 Sposób dostawy</h2>
          <div id="deliveryOptions">
            <!-- Wypełniane przez updateShippingPrices() -->
          </div>
        </div>

        <!-- Sposób płatności -->
        <div class="form-section">
          <h2>💳 Sposób płatności</h2>
          
          <label class="payment-option selected" onclick="selectPayment(this, 'transfer')">
            <input type="radio" name="payment" value="transfer" checked>
            <div style="flex:1;">
              <h4 style="margin-bottom:4px;">🏦 Przelew bankowy</h4>
              <p style="font-size:13px;color:var(--color-text-muted);">Po złożeniu zamówienia otrzymasz dane do przelewu</p>
            </div>
          </label>
          
          <label class="payment-option" onclick="selectPayment(this, 'cod')">
            <input type="radio" name="payment" value="cod">
            <div style="flex:1;">
              <h4 style="margin-bottom:4px;">💰 Pobranie</h4>
              <p style="font-size:13px;color:var(--color-text-muted);">Płacisz kurierowi przy odbiorze (+5 zł)</p>
            </div>
          </label>
          
          <label class="payment-option" onclick="selectPayment(this, 'paypal')">
            <input type="radio" name="payment" value="paypal">
            <div style="flex:1;">
              <h4 style="margin-bottom:4px;">💳 PayPal / Karta</h4>
              <p style="font-size:13px;color:var(--color-text-muted);">Bezpieczna płatność online</p>
            </div>
          </label>
        </div>

        <!-- Uwagi -->
        <div class="form-section">
          <h2>📝 Uwagi do zamówienia</h2>
          <div class="form-group">
            <textarea name="notes" placeholder="Np. dzwonić przed dostawą, kod do bramy, preferencje..."></textarea>
          </div>
        </div>

        <!-- Zgody -->
        <div class="form-section">
          <h2>✅ Wymagane zgody</h2>
          
          <label class="checkbox-row">
            <input type="checkbox" name="terms" required>
            <label>Zapoznałem(am) się i akceptuję <a href="regulamin.html" target="_blank">regulamin sklepu</a> oraz <a href="zwroty-reklamacje.html" target="_blank">zasady zwrotów i reklamacji</a> <span class="req">*</span></label>
          </label>
          
          <label class="checkbox-row">
            <input type="checkbox" name="privacy" required>
            <label>Zapoznałem(am) się z <a href="polityka-prywatnosci.html" target="_blank">polityką prywatności</a> i wyrażam zgodę na przetwarzanie danych osobowych w celu realizacji zamówienia <span class="req">*</span></label>
          </label>
          
          <label class="checkbox-row">
            <input type="checkbox" name="newsletter">
            <label>Chcę otrzymywać newsletter z informacjami o promocjach i nowościach (opcjonalnie)</label>
          </label>
        </div>
      </form>

      <!-- PODSUMOWANIE -->
      <div class="order-summary">
        <h3>📋 Twoje zamówienie</h3>
        
        <div id="summaryItems"></div>
        
        <div class="summary-totals">
          <div class="summary-row">
            <span>Suma częsci</span>
            <span id="subtotalAmount" class="summary-amount">0 zł</span>
          </div>
          <div class="summary-row">
            <span>Dostawa</span>
            <span id="shippingAmount" class="summary-amount">—</span>
          </div>
          <div class="summary-row" id="codRow" style="display:none;">
            <span>Pobranie</span>
            <span class="summary-amount">+5 zł</span>
          </div>
          <div class="summary-row total">
            <span>RAZEM</span>
            <span id="totalAmount" class="summary-amount">0 zł</span>
          </div>
        </div>
        
        <button type="submit" form="orderForm" class="submit-order">
          ✈️ Złóż zamówienie przez Telegram
        </button>
        
        <p style="font-size:11px;color:var(--color-text-muted);text-align:center;margin-top:12px;line-height:1.5;">
          Zamówienie zostanie wysłane do bota Telegram, gdzie potwierdzimy dostępność i wyślemy dane do płatności.
        </p>
      </div>
    </div>
  `;
  
  renderSummary();
  updateShippingPrices();
}

const SHIPPING_PRICES = {
  PL: {
    paczkomat: { name: '📦 InPost Paczkomat', price: 13, time: '1-2 dni' },
    kurier: { name: '🚚 Kurier DPD/DHL', price: 22, time: '1-2 dni' },
    pickup: { name: '🏪 Odbiór osobisty', price: 0, time: 'Po umówieniu' }
  },
  EU: {
    standard: { name: '🌍 Standard EU (DPD/UPS)', price: 45, time: '3-5 dni' },
    express: { name: '⚡ Express EU (DHL)', price: 80, time: '1-2 dni' }
  },
  UA: {
    novaposhta: { name: '🇺🇦 Nova Poshta', price: 100, time: '5-7 dni' },
    novaposhta_express: { name: '⚡ Nova Poshta Express', price: 150, time: '3-4 dni' }
  }
};

function getShippingZone(country) {
  if (country === 'PL') return 'PL';
  if (country === 'UA') return 'UA';
  return 'EU';
}

let selectedShipping = null;
let selectedShippingPrice = 0;

function updateShippingPrices() {
  const country = document.querySelector('select[name="country"]')?.value || 'PL';
  const zone = getShippingZone(country);
  const options = SHIPPING_PRICES[zone];
  
  let html = '';
  Object.entries(options).forEach(([key, opt], idx) => {
    const isFirst = idx === 0;
    html += `
      <label class="delivery-option ${isFirst ? 'selected' : ''}" onclick="selectShipping(this, '${key}', ${opt.price})">
        <input type="radio" name="shipping" value="${key}" ${isFirst ? 'checked' : ''}>
        <div class="delivery-info">
          <h4>${opt.name}</h4>
          <p>Czas dostawy: ${opt.time}</p>
        </div>
        <div class="delivery-price">
          ${opt.price === 0 ? 'GRATIS' : opt.price + ' zł'}
          ${opt.price > 0 ? '<small>za przesyłkę</small>' : ''}
        </div>
      </label>
    `;
  });
  
  document.getElementById('deliveryOptions').innerHTML = html;
  
  // Wybierz pierwszą opcję domyślnie
  const firstKey = Object.keys(options)[0];
  selectedShipping = firstKey;
  selectedShippingPrice = options[firstKey].price;
  updateTotals();
}

function selectShipping(elem, key, price) {
  document.querySelectorAll('.delivery-option').forEach(o => o.classList.remove('selected'));
  elem.classList.add('selected');
  selectedShipping = key;
  selectedShippingPrice = price;
  updateTotals();
}

function selectPayment(elem, value) {
  document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
  elem.classList.add('selected');
  document.getElementById('codRow').style.display = (value === 'cod') ? 'flex' : 'none';
  updateTotals();
}

function toggleInvoice() {
  const cb = document.getElementById('wantInvoice');
  document.getElementById('invoiceFields').style.display = cb.checked ? 'block' : 'none';
}

function renderSummary() {
  const html = STATE.cart.map(item => `
    <div class="summary-item">
      <div class="summary-item-img">
        ${item.img ? `<img src="${item.img}" onerror="this.outerHTML='🔧'">` : '🔧'}
      </div>
      <div class="summary-item-info">
        <div class="summary-item-name">${item.name}</div>
        <div class="summary-item-qty">${item.qty} szt × ${pricePLN(item.price_usd)}</div>
      </div>
      <div class="summary-item-price">${pricePLN(item.price_usd * item.qty)}</div>
    </div>
  `).join('');
  document.getElementById('summaryItems').innerHTML = html;
}

function updateTotals() {
  const subtotal = STATE.cart.reduce((sum, item) => sum + item.price_usd * item.qty, 0);
  const subtotalPLN = subtotal * APP.RATES.USD_to_PLN * APP.RATES.BUFFER;
  const cod = (document.querySelector('input[name="payment"]:checked')?.value === 'cod') ? 5 : 0;
  const total = subtotalPLN + selectedShippingPrice + cod;
  
  document.getElementById('subtotalAmount').textContent = subtotalPLN.toFixed(2) + ' zł';
  document.getElementById('shippingAmount').textContent = selectedShippingPrice === 0 ? 'GRATIS' : selectedShippingPrice + ' zł';
  document.getElementById('totalAmount').textContent = total.toFixed(2) + ' zł';
}

function submitFullOrder(form) {
  const f = new FormData(form);
  
  let msg = `🛒 *NOWE ZAMÓWIENIE ze sklepu*\n\n`;
  msg += `👤 *Klient:*\n`;
  msg += `${f.get('name')}\n`;
  msg += `📞 ${f.get('phone')}\n`;
  msg += `📧 ${f.get('email')}\n\n`;
  
  if (f.get('company')) {
    msg += `🧾 *Firma:* ${f.get('company')}\n`;
    msg += `NIP: ${f.get('nip')}\n\n`;
  }
  
  msg += `📍 *Adres dostawy:*\n`;
  msg += `${f.get('street')}\n`;
  msg += `${f.get('zip')} ${f.get('city')}\n`;
  msg += `${f.get('country')}\n\n`;
  
  msg += `📦 *Zamówione części (${STATE.cart.length}):*\n`;
  STATE.cart.forEach((item, i) => {
    msg += `\n${i+1}. ${item.name}\n`;
    msg += `   Kod: ${item.catno} | Model: ${item.model}\n`;
    msg += `   ${item.qty} szt × ${pricePLN(item.price_usd)} = ${pricePLN(item.price_usd * item.qty)}\n`;
  });
  
  const subtotal = STATE.cart.reduce((s, i) => s + i.price_usd * i.qty, 0);
  const subtotalPLN = subtotal * APP.RATES.USD_to_PLN * APP.RATES.BUFFER;
  const cod = f.get('payment') === 'cod' ? 5 : 0;
  const total = subtotalPLN + selectedShippingPrice + cod;
  
  msg += `\n💰 *Podsumowanie:*\n`;
  msg += `Suma części: ${subtotalPLN.toFixed(2)} zł\n`;
  msg += `Dostawa (${selectedShipping}): ${selectedShippingPrice === 0 ? 'GRATIS' : selectedShippingPrice + ' zł'}\n`;
  if (cod) msg += `Pobranie: +5 zł\n`;
  msg += `\n💎 *RAZEM: ${total.toFixed(2)} zł*\n\n`;
  
  msg += `💳 Płatność: ${f.get('payment')}\n`;
  
  if (f.get('notes')) msg += `\n📝 Uwagi: ${f.get('notes')}\n`;
  
  // Otwórz Telegram
  const tgUrl = `https://t.me/dji_agras_parts_bot?start=order_${Date.now()}`;
  window.open(tgUrl, '_blank');
  
  navigator.clipboard?.writeText(msg).catch(() => {});
  
  alert(`✅ Zamówienie wysłane!\n\nWiadomość skopiowana do schowka. Wklej ją w czacie z botem.\n\n${msg}`);
  
  // Wyczyść koszyk
  STATE.cart = [];
  saveCart();
  
  // Przekieruj
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(renderCheckout, 100);
});
</script>
