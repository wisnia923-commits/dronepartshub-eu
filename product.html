<script>
async function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const partId = params.get('id');
  
  if (!partId) {
    document.getElementById('productContent').innerHTML = `
      <div class="not-found">
        <h1>Brak produktu</h1>
        <p>Nie wybrano produktu. Wróć do katalogu.</p>
        <a href="catalog.html" class="btn btn--primary">📦 Katalog części</a>
      </div>`;
    return;
  }

  try {
    console.log('📦 Ładowanie szczegółów produktu...');
    const res = await fetch('parts.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const parts = await res.json();
    console.log('✅ Produkty załadowane: ' + parts.length);
    const part = parts.find(p => p.id == partId);
    
    if (!part) {
      document.getElementById('productContent').innerHTML = `
        <div class="not-found">
          <h1>Nie znaleziono</h1>
          <p>Część o ID ${partId} nie istnieje w bazie.</p>
          <a href="catalog.html" class="btn btn--primary">📦 Wróć do katalogu</a>
        </div>`;
      return;
    }

    renderProduct(part, parts);
  } catch (e) {
    console.error(e);
    document.getElementById('productContent').innerHTML = `
      <div class="not-found">
        <h1>Błąd ładowania</h1>
        <p>${e.message}</p>
      </div>`;
  }
}

function renderProduct(p, allParts) {
  const lang = STATE.lang || 'pl';
  const name = p[`nazwa_${lang}`] || p.nazwa_en;
  const cat = p[`kategoria_${lang}`] || p.kategoria_en;
  const desc = p[`opis_${lang}`] || p.opis_en || '';
  const stock = p.stan_magazynowy || 0;
  
  let stockBadge = '';
  if (stock > 5) stockBadge = '<span class="product-badge badge-stock">✓ Dostępny</span>';
  else if (stock > 0) stockBadge = `<span class="product-badge badge-low-stock">⚠ Tylko ${stock} szt!</span>`;
  else stockBadge = '<span class="product-badge badge-stock">Na zamówienie</span>'; // pokazujemy że można zamówić
  
  // Znajdź podobne części (ta sama kategoria, inny ID)
  const related = allParts
    .filter(x => x[`kategoria_${lang}`] === cat && x.id !== p.id && x.model === p.model)
    .slice(0, 4);
  
  document.getElementById('productContent').innerHTML = `
    <div class="product-breadcrumb">
      <a href="index.html" data-i18n="nav_home">Start</a> / 
      <a href="catalog.html" data-i18n="nav_parts">Części</a> / 
      <a href="catalog.html?model=${p.model}">${p.model}</a> / 
      <span>${name}</span>
    </div>
    
    <div class="product-layout">
      <div class="product-images">
        <div class="product-image-main">
          ${p.zdjecie_url 
            ? `<img src="${p.zdjecie_url}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div class="product-image-placeholder" style="display:none;">🔧</div>`
            : `<div class="product-image-placeholder">🔧</div>`}
        </div>
      </div>
      
      <div class="product-info">
        <div class="product-category">${cat}</div>
        <h1>${name}</h1>
        
        <div class="product-meta">
          <span class="product-badge badge-model">${p.model}</span>
          ${stockBadge}
        </div>
        
        <div class="product-catno">SKU / Numer katalogowy: ${p.numer_katalogowy}</div>
        
        <div class="product-prices">
          <div class="product-price-main">${pricePLN(p.cena_usd)}</div>
          <div class="product-prices-other">
            <div class="product-price-other">
              <span>USD</span>
              ${priceUSD(p.cena_usd)}
            </div>
            <div class="product-price-other">
              <span>EUR</span>
              ${priceEUR(p.cena_usd)}
            </div>
          </div>
        </div>
        
        <div class="product-actions">
          <div class="qty-selector">
            <button onclick="changeQty(-1)">−</button>
            <input type="number" id="qtyInput" value="1" min="1" max="99">
            <button onclick="changeQty(1)">+</button>
          </div>
          <button class="add-to-cart-large" onclick="addProductToCart(${p.id})">
            🛒 Dodaj do koszyka
          </button>
        </div>
        
        <div class="shipping-info">
          <h4>📦 Informacje o dostawie</h4>
          <div class="shipping-row">
            <strong>📦 InPost Paczkomat:</strong> 12-15 zł, dostawa 1-2 dni
          </div>
          <div class="shipping-row">
            <strong>🚚 Kurier DPD/DHL:</strong> 18-25 zł, dostawa 1-2 dni
          </div>
          <div class="shipping-row">
            <strong>🌍 Wysyłka EU:</strong> 35-80 zł, dostawa 3-7 dni
          </div>
          <div class="shipping-row">
            <strong>🇺🇦 Wysyłka Ukraina:</strong> 80-150 zł, dostawa 5-10 dni
          </div>
        </div>
        
        <div class="product-features">
          <h3>📋 Specyfikacja</h3>
          <div class="feature-row">
            <div class="feature-label">Numer katalogowy</div>
            <div class="feature-value">${p.numer_katalogowy}</div>
          </div>
          <div class="feature-row">
            <div class="feature-label">Model drona</div>
            <div class="feature-value">DJI Agras ${p.model}</div>
          </div>
          <div class="feature-row">
            <div class="feature-label">Kategoria</div>
            <div class="feature-value">${cat}</div>
          </div>
          <div class="feature-row">
            <div class="feature-label">Kompatybilność</div>
            <div class="feature-value">${p.model}</div>
          </div>
          <div class="feature-row">
            <div class="feature-label">Stan magazynu</div>
            <div class="feature-value">${stock > 0 ? `${stock} szt.` : 'Na zamówienie (5-10 dni)'}</div>
          </div>
          <div class="feature-row">
            <div class="feature-label">Gwarancja</div>
            <div class="feature-value">12 miesięcy</div>
          </div>
        </div>
        
        ${desc ? `
        <div class="product-description">
          <h3 style="font-family:var(--font-display);font-size:18px;letter-spacing:0.05em;margin-bottom:16px;color:var(--color-accent);text-transform:uppercase;">📝 Opis</h3>
          <p>${desc}</p>
        </div>` : ''}
        
        <div style="background:rgba(255,255,255,0.03);padding:20px;border-radius:8px;border:1px solid var(--color-line);margin-top:24px;">
          <p style="font-size:14px;color:var(--color-text-muted);margin-bottom:12px;">💬 Masz pytanie o tę część?</p>
          <a href="https://t.me/agras_spare_parts_bot" target="_blank" class="btn btn--ghost" style="font-size:13px;padding:12px 24px;">
            ✈️ Zapytaj na Telegram
          </a>
        </div>
      </div>
    </div>
    
    ${related.length > 0 ? `
    <section class="related-section">
      <h2>Podobne części dla ${p.model}</h2>
      <div class="products-grid">
        ${related.map(r => {
          const rname = r[`nazwa_${lang}`] || r.nazwa_en;
          return `
            <div class="product-card" onclick="window.location.href='product.html?id=${r.id}'">
              <div class="product-card__img">
                <span class="product-card__model">${r.model}</span>
                ${r.zdjecie_url 
                  ? `<img src="${r.zdjecie_url}" alt="${rname}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                     <div class="product-card__placeholder" style="display:none;">🔧</div>`
                  : `<div class="product-card__placeholder">🔧</div>`}
              </div>
              <div class="product-card__body">
                <div class="product-card__catno">${r.numer_katalogowy}</div>
                <div class="product-card__name">${rname}</div>
                <div class="product-card__prices">
                  <div class="product-card__price-row primary">
                    <span>PLN</span>
                    <span>${pricePLN(r.cena_usd)}</span>
                  </div>
                </div>
                <button class="product-card__add" onclick="event.stopPropagation();addToCart(${r.id})">
                  Dodaj
                </button>
              </div>
            </div>`;
        }).join('')}
      </div>
    </section>` : ''}
  `;
}

function changeQty(delta) {
  const input = document.getElementById('qtyInput');
  const newQty = Math.max(1, Math.min(99, parseInt(input.value || 1) + delta));
  input.value = newQty;
}

function addProductToCart(partId) {
  const qty = parseInt(document.getElementById('qtyInput').value) || 1;
  for (let i = 0; i < qty; i++) {
    addToCart(partId);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  // Czekaj aż app.js załaduje STATE
  setTimeout(loadProduct, 100);
});
</script>

<!-- Consent Mode integration z bannerem cookies -->
<script>
(function() {
  window.acceptAllCookies = function() {
    try { localStorage.setItem('cookie_consent', 'accepted_all'); } catch(e) {}
    if (typeof gtag === 'function') {
      gtag('consent', 'update', {
        'ad_storage': 'granted',
        'ad_user_data': 'granted',
        'ad_personalization': 'granted',
        'analytics_storage': 'granted',
        'personalization_storage': 'granted'
      });
    }
    var banner = document.querySelector('.cookie-banner, #cookie-banner, [class*="cookie"]');
    if (banner) banner.style.display = 'none';
  };
  window.acceptEssentialOnly = function() {
    try { localStorage.setItem('cookie_consent', 'essential_only'); } catch(e) {}
    if (typeof gtag === 'function') {
      gtag('consent', 'update', { 'analytics_storage': 'granted' });
    }
    var banner = document.querySelector('.cookie-banner, #cookie-banner, [class*="cookie"]');
    if (banner) banner.style.display = 'none';
  };
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('button, a').forEach(function(btn) {
      var txt = (btn.textContent || '').trim().toLowerCase();
      if (txt.includes('akceptuję wszystkie') || txt.includes('accept all') ||
          txt.includes('прийняти всі') || txt.includes('全部接受')) {
        btn.addEventListener('click', window.acceptAllCookies);
      } else if (txt.includes('tylko niezbędne') || txt.includes('essential only') ||
                 txt.includes('тільки необхідні') || txt.includes('仅必要')) {
        btn.addEventListener('click', window.acceptEssentialOnly);
      }
    });
  });
})();
</script>
